name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Host a game with `loba host --public`
        2. Join from another machine
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Loba version
      description: Shown on launch, or run `loba update` to see the latest.
      placeholder: "v1.6.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any terminal output or attach a screenshot.
